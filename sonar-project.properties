# ═══════════════════════════════════════════════════════════════════════════════
#  Cook's — SonarQube Project Configuration
#
#  Analysed languages : JavaScript (frontend), PHP (backend API)
#  Quality gates      : Default Sonar Way + custom JS/PHP rules
#
#  Run analysis:
#    docker-compose run --rm scanner          (via Docker)
#    sonar-scanner                            (if sonar-scanner is in PATH)
# ═══════════════════════════════════════════════════════════════════════════════

# ── Project identity ──────────────────────────────────────────────────────────
sonar.projectKey=cooks-kitchen
sonar.projectName=Cook's — AI Kitchen Platform
sonar.projectVersion=1.0

# ── Source roots ──────────────────────────────────────────────────────────────
sonar.sources=.
sonar.tests=Cook-Testing

# ── Language-specific roots ───────────────────────────────────────────────────
# JavaScript sources
sonar.javascript.file.suffixes=.js

# PHP sources
sonar.php.file.suffixes=.php

# ── Include / exclude patterns ────────────────────────────────────────────────
# Analyse these paths for production code
sonar.inclusions=\
  script.js,\
  api/**/*.php,\
  Cook-Testing/**/*.js

# Exclude vendor code, generated files, assets, and Git internals
sonar.exclusions=\
  node_modules/**,\
  .git/**,\
  assets/**,\
  *.json,\
  scraper/**,\
  Cook-Testing/**/*.html,\
  Cook-Testing/7-K6-Performance/results/**

# Test source directories (coverage reports)
sonar.test.inclusions=\
  Cook-Testing/3-White-Box-Testing/unit-tests.js,\
  Cook-Testing/3-White-Box-Testing/unit-tests-extended.js,\
  Cook-Testing/2-Black-Box-Testing/**/*.tests.js

# ── Encoding ──────────────────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8

# ── SonarQube server ──────────────────────────────────────────────────────────
# Overridden by SONAR_HOST_URL env var in docker-compose
sonar.host.url=http://localhost:9000

# ── Authentication ────────────────────────────────────────────────────────────
# Set via env: SONAR_TOKEN=<project-token>
# Or hardcode for local dev (do NOT commit real tokens):
# sonar.token=sqp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

# ── JavaScript-specific ───────────────────────────────────────────────────────
# Detect ECMAScript version used in script.js
sonar.javascript.environments=browser,node

# ── PHP-specific ─────────────────────────────────────────────────────────────
sonar.php.version=8.0

# ── Coverage reports ─────────────────────────────────────────────────────────
# If you generate an LCOV report from your test runner, point here:
# sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ── Duplication ───────────────────────────────────────────────────────────────
# Minimum token count to report a duplicate block (lower = stricter)
sonar.cpd.js.minimumtokens=50
sonar.cpd.php.minimumtokens=50

# ── Quality gate ─────────────────────────────────────────────────────────────
# Uses the default "Sonar Way" gate; configure custom one in the UI
